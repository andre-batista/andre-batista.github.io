<script>
(function () {
  var LANG_KEY = 'preferred-lang';

  var navTranslations = {
    'Ensino': 'Teaching',
    'Extensão': 'Extension',
    'Pesquisa': 'Research',
    'Código Aberto': 'Open Source',
    'Sobre Mim': 'About Me'
  };

  var brandTranslations = {
    'Perfil Acadêmico': 'Academic Profile'
  };

  var subtitleTranslations = {
    'Professor Assistente · DEE/UFMG': 'Assistant Professor · DEE/UFMG'
  };

  var titleTranslations = {
    'Ensino': 'Teaching',
    'Extensão': 'Extension',
    'Pesquisa': 'Research',
    'Código Aberto': 'Open Source',
    'Sobre Mim': 'About Me'
  };

  window.toggleLang = function () {
    var current = document.body.getAttribute('data-lang') || 'pt';
    applyLang(current === 'pt' ? 'en' : 'pt');
  };

  function applyLang(lang) {
    document.body.setAttribute('data-lang', lang);
    var btn = document.getElementById('lang-toggle-btn');

    if (lang === 'en') {
      if (btn) btn.textContent = 'PT';

      document.querySelectorAll('.navbar-nav .nav-link').forEach(function (link) {
        var text = link.textContent.trim();
        if (navTranslations[text]) {
          link.setAttribute('data-pt-text', text);
          link.textContent = navTranslations[text];
        }
      });

      var brand = document.querySelector('.navbar-brand .navbar-title');
      if (brand) {
        var brandText = brand.textContent.trim();
        if (brandTranslations[brandText]) {
          brand.setAttribute('data-pt-text', brandText);
          brand.textContent = brandTranslations[brandText];
        }
      }

      var h1 = document.querySelector('h1.title');
      if (h1) {
        var ptTitle = h1.textContent.trim();
        if (titleTranslations[ptTitle]) {
          h1.setAttribute('data-pt-text', ptTitle);
          h1.textContent = titleTranslations[ptTitle];
        }
      }

      var subtitle = document.querySelector('p.subtitle');
      if (subtitle) {
        var ptSub = subtitle.textContent.trim();
        if (subtitleTranslations[ptSub]) {
          subtitle.setAttribute('data-pt-text', ptSub);
          subtitle.textContent = subtitleTranslations[ptSub];
        }
      }

    } else {
      if (btn) btn.textContent = 'EN';

      document.querySelectorAll('.navbar-nav .nav-link').forEach(function (link) {
        var ptText = link.getAttribute('data-pt-text');
        if (ptText) link.textContent = ptText;
      });

      var brand = document.querySelector('.navbar-brand .navbar-title');
      if (brand) {
        var ptBrand = brand.getAttribute('data-pt-text');
        if (ptBrand) brand.textContent = ptBrand;
      }

      var h1 = document.querySelector('h1.title');
      if (h1) {
        var ptTitle = h1.getAttribute('data-pt-text');
        if (ptTitle) h1.textContent = ptTitle;
      }

      var subtitle = document.querySelector('p.subtitle');
      if (subtitle) {
        var ptSub = subtitle.getAttribute('data-pt-text');
        if (ptSub) subtitle.textContent = ptSub;
      }
    }

    localStorage.setItem(LANG_KEY, lang);
  }

  document.addEventListener('DOMContentLoaded', function () {
    // Create button and inject it into the navbar tools area, before the search icon
    var btn = document.createElement('button');
    btn.id = 'lang-toggle-btn';
    btn.setAttribute('title', 'Switch language / Mudar idioma');
    btn.setAttribute('aria-label', 'Switch language');
    btn.textContent = 'EN';
    btn.onclick = window.toggleLang;

    var searchDiv = document.getElementById('quarto-search');
    if (searchDiv && searchDiv.parentNode) {
      searchDiv.parentNode.insertBefore(btn, searchDiv);
    } else {
      // Fallback: append to navbar container
      var navbar = document.querySelector('.navbar-container');
      if (navbar) navbar.appendChild(btn);
    }

    var saved = localStorage.getItem(LANG_KEY) || 'pt';
    applyLang(saved);
  });
})();
</script>
